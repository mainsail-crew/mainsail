# WCS macros — coordinate system selection and zeroing.
# Requires [work_coordinate_systems] in printer.cfg.

[gcode_macro WCS_1]
description: Activate Coordinate System 1 (G54)
gcode:
  G54

[gcode_macro WCS_2]
description: Activate Coordinate System 2 (G55)
gcode:
  G55

[gcode_macro WCS_3]
description: Activate Coordinate System 3 (G56)
gcode:
  G56

[gcode_macro WCS_4]
description: Activate Coordinate System 4 (G57)
gcode:
  G57

[gcode_macro WCS_5]
description: Activate Coordinate System 5 (G58)
gcode:
  G58

[gcode_macro WCS_6]
description: Activate Coordinate System 6 (G59)
gcode:
  G59

[gcode_macro MACHINE_COORDS]
description: Switch to raw machine coordinates (G53)
gcode:
  G53

[gcode_macro ZERO_X]
description: Zero X in the active WCS
gcode:
  G10 L20 P{printer.work_coordinate_systems.active_p} X0

[gcode_macro ZERO_Y]
description: Zero Y in the active WCS
gcode:
  G10 L20 P{printer.work_coordinate_systems.active_p} Y0

[gcode_macro ZERO_Z]
description: Zero Z in the active WCS
gcode:
  G10 L20 P{printer.work_coordinate_systems.active_p} Z0

[gcode_macro ZERO_ALL]
description: Zero X, Y and Z in the active WCS, then show full WCS status
gcode:
  G10 L20 P{printer.work_coordinate_systems.active_p} X0 Y0 Z0
  WCS_STATUS
