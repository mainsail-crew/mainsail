# Moonraker update_manager entry for Mainsail CNC fork
# Add to your moonraker.conf or include via: [include mainsail-cnc-update.conf]

[update_manager mainsail-cnc]
type: git_repo
channel: dev
path: /home/biqu/mainsail-cnc
origin: https://github.com/isaaceliape/mainsail-cnc.git
primary_branch: develop
enable_node_updates: False
is_system_service: False
info_tags:
    desc=Mainsail CNC
    post_update=./deploy.sh --live && cp -f klipper-extras/work_coordinate_systems.py /home/biqu/klipper/klippy/extras/work_coordinate_systems.py && cp -f klipper-macros/wcs_macros.cfg /home/biqu/printer_data/config/macros/wcs_macros.cfg && cp -f moonraker-cnc-agent/src/moonraker_cnc_agent/cnc_agent.py /home/biqu/moonraker/moonraker/components/cnc_agent/cnc_agent.py && cp -f moonraker-cnc-agent/src/moonraker_cnc_agent/cnc_metadata.py /home/biqu/moonraker/moonraker/components/cnc_metadata/cnc_metadata.py
managed_services: klipper moonraker
refresh_interval: 24
