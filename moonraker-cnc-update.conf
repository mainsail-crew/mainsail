# Moonraker update_manager entry for Mainsail CNC fork
# Add to your moonraker.conf or include via: [include mainsail-cnc-update.conf]

[update_manager mainsail-cnc]
type: git_repo
channel: dev
path: /home/biqu/mainsail-cnc
origin: https://github.com/isaaceliape/mainsail.git
primary_branch: cnc-scaffold
enable_node_updates: True
is_system_service: False
info_tags:
    desc=Mainsail CNC Fork
    post_update=deploy.sh --live
managed_services: klipper
refresh_interval: 24
