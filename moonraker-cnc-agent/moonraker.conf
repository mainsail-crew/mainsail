[server]
host: 0.0.0.0
port: 7125
enable_debugging: True

[data_store]
# path: ~/moonraker_data

[file_manager]
enable_object_processing: True

[authorization]
trusted_clients:
    10.0.0.0/8
    127.0.0.0/8
    192.168.0.0/16
    172.16.0.0/12
    ::1/128

[update_manager]
enable_auto_update: False
enable_system_sudo: False

# Enable our custom CNC Agent
[cnc_agent]

# ---------------------------------------------------------------------------
# CNC gcode metadata extractor
# ---------------------------------------------------------------------------
# Registers a gcode_file processor that runs scripts/cnc_metadata_extractor.py
# on every gcode file. The extractor writes <file>.cnc-meta.json next to
# the gcode and tags the file with a `; CNC-METADATA-V1` footer, so the
# processor's ident regex short-circuits on subsequent refreshes.
#
# extractor_path is the absolute path on the target where the install
# script deploys scripts/cnc_metadata_extractor.py. If the path does
# not exist the component logs a warning and the processor is not
# registered — a stock Moonraker install is unaffected.
# ---------------------------------------------------------------------------
[cnc_metadata]
extractor_path: ~/printer_data/scripts/cnc_metadata_extractor.py
timeout: 30.0

# ---------------------------------------------------------------------------
# Mainsail-CNC update manager entry
# ---------------------------------------------------------------------------
# The agent, Mainsail fork, and Klipper macros all live in the
# mainsail-cnc monorepo. A single [update_manager] entry pointing at
# the monorepo root covers all three — they version together, and a
# real git clone (not a synthetic subpath) avoids the "ahead 1, behind
# N, is_valid=false" state that happens when individual subdirs are
# git-init'd in place.
#
# The install script (./scripts/install_to_moonraker.sh) writes a
# resolved version of this section into your active moonraker.conf on
# first deploy (with the path filled in from CNC_REPO_DIR). You can
# also paste it in by hand, or include the snippet at
# config/examples/update-manager.conf.
#
# Manual update flow after a `git pull` in Mainsail's update manager:
#   1. Mainsail does `git pull` on the monorepo and restarts moonraker.
#   2. Re-run ./scripts/install_to_moonraker.sh to re-vendor the agent
#      from moonraker-cnc-agent/src/... into
#      moonraker/moonraker/components/cnc_agent/ and pick up the new code.
#   3. In upstream-mainsail/: `bun install` (if bun.lock changed) and
#      `bun run build`, then refresh the browser.
#   4. RESTART Klipper from the Mainsail dashboard to reload the
#      klipper-macros/ snippets.
# ---------------------------------------------------------------------------

[update_manager mainsail-cnc]
type: git_repo
channel: dev
path: ~/mainsail-cnc
origin: https://github.com/isaaceliape/mainsail-cnc.git
primary_branch: main
# The frontend uses Bun, not npm, so we disable Moonraker's npm tracking.
enable_node_updates: False
is_system_service: False
# After a `git pull`, Moonraker itself is restarted (managed_services).
# The agent vendoring, frontend build, and Klipper restart still need
# to happen manually. Surface that to the user via info_tags.
info_tags:
    desc=Mainsail-CNC
    post_update=Re-run ./scripts/install_to_moonraker.sh to re-vendor the agent; `bun run build` in upstream-mainsail/ and refresh; RESTART Klipper for the macros.
managed_services: moonraker
refresh_interval: 24
